name: Generate XML Sitemap

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# This is the "Magic Fix" for Error 128
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4 # v4 is stable, v5 is also acceptable
      with:
        fetch-depth: 0 

    - name: Generate the sitemap
      id: sitemap
      uses: cicirello/generate-sitemap@v1
      with:
        base-url-path: https://upnextsg.github.io/sg-vibes/
        
    - name: Commit and push
      run: |
        # Check if sitemap.xml actually changed
        if [[ -n "$(git status --porcelain sitemap.xml)" ]]; then
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sitemap.xml
          git commit -m "Automated sitemap update"
          git push
        else
          echo "No changes to sitemap.xml. Skipping push."
        fi
